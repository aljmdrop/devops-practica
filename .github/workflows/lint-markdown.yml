name: Lint Markdown

on: [push, pull_request]

jobs:
    markdownlint:
        runs-on: ubuntu-latest'
        steps:
            - name: Checkout
              uses: actions/checkout@v2

            - name: Run markdownlint
              uses: davidanson/markdownlint-cli2-action@v16
              with:
                  config: '.markdownlint.json'
                  globs: '**/*.md'